name: Remove PR & Issue from Project
on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: write
  # project item deletion uses GraphQL via github-script

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const repo = context.repo;

            // --- CONFIG ---
            const ORG = 'onlyHydra';
            const PROJECT_NUMBER = 1;
            const STATUS_FIELD_NAME = 'Status';
            const DONE_OPTION_NAME  = 'Done';
            // --------------

            // Helper: resolve project + Status field + Done option
            async function getProjectAndStatus() {
              const q = `
                query($org:String!, $number:Int!){
                  user(login:$org){
                    projectV2(number:$number){
                      id
                      fields(first:100){
                        nodes{
                          __typename
                          ... on ProjectV2SingleSelectField { id name options { id name } }
                        }
                      }
                    }
                  }
                }`;
              const r = await github.graphql(q, { org: ORG, number: PROJECT_NUMBER });
              const project = r.organization.projectV2;
              const statusField = project.fields.nodes.find(f => f && f.__typename === 'ProjectV2SingleSelectField' && f.name === STATUS_FIELD_NAME);
              if (!statusField) throw new Error(`Field "${STATUS_FIELD_NAME}" not found`);
              const doneOpt = statusField.options.find(o => o.name === DONE_OPTION_NAME);
              if (!doneOpt) throw new Error(`Option "${DONE_OPTION_NAME}" not found`);
              return { project, statusField, doneOpt };
            }

            // Helper: list all project items (paged)
            async function listProjectItems(projectId) {
              const items = [];
              let after = null;
              while (true) {
                const q = `
                  query($id:ID!, $after:String){
                    node(id:$id){
                      ... on ProjectV2 {
                        items(first:100, after:$after){
                          nodes{
                            id
                            content { __typename ... on Issue { id number } ... on PullRequest { id number } }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }`;
                const r = await github.graphql(q, { id: projectId, after });
                const page = r.node.items;
                items.push(...page.nodes);
                if (!page.pageInfo.hasNextPage) break;
                after = page.pageInfo.endCursor;
              }
              return items;
            }

            // Helper: read the Status value of a project item by name
            async function getStatusOptionId(projectId, itemId, fieldName) {
              const q = `
                query($projectId:ID!, $itemId:ID!, $fieldName:String!){
                  node(id:$projectId){
                    ... on ProjectV2 {
                      item(id:$itemId){
                        id
                        fieldValueByName(name:$fieldName){
                          __typename
                          ... on ProjectV2ItemFieldSingleSelectValue { name optionId }
                        }
                      }
                    }
                  }
                }`;
              const r = await github.graphql(q, { projectId, itemId, fieldName });
              const fv = r.node.item?.fieldValueByName;
              if (!fv || fv.__typename !== 'ProjectV2ItemFieldSingleSelectValue') return null;
              return { name: fv.name, optionId: fv.optionId };
            }

            // Helper: delete a project item
            async function deleteItem(projectId, itemId) {
              await github.graphql(`
                mutation($projectId:ID!, $itemId:ID!){
                  deleteProjectV2Item(input:{ projectId:$projectId, itemId:$itemId }) { deletedItemId }
                }`, { projectId, itemId });
            }

            // Determine the event type
            const isReview = context.eventName === 'pull_request_review' && context.payload.action === 'submitted';
            const isMerged = context.eventName === 'pull_request' && context.payload.action === 'closed' && context.payload.pull_request.merged;

            if (!isReview && !isMerged) {
              core.info('Nothing to do for this event.');
              return;
            }

            // Load PR data depending on event
            const pr = isReview ? context.payload.pull_request : context.payload.pull_request;
            if (!pr) { core.info('No PR payload'); return; }

            // For review events, only continue on APPROVED
            if (isReview && (context.payload.review.state || '').toLowerCase() !== 'approved') {
              core.info('Review is not APPROVED; skipping.');
              return;
            }

            // 1) Resolve project + Status/Done
            const { project, statusField, doneOpt } = await getProjectAndStatus();

            // 2) Find the PR's project item
            const items = await listProjectItems(project.id);
            const prItem = items.find(n => n.content?.__typename === 'PullRequest' && n.content.number === pr.number);

            // 3) Find linked issues for this PR (use GraphQL: closingIssuesReferences)
            const prQ = `
              query($owner:String!, $repo:String!, $number:Int!){
                repository(owner:$owner, name:$repo){
                  pullRequest(number:$number){
                    number
                    closingIssuesReferences(first:20){ nodes { number id } }
                    body
                    title
                  }
                }
              }`;
            const prData = await github.graphql(prQ, { owner: repo.owner, repo: repo.repo, number: pr.number });
            const closingIssues = prData.repository.pullRequest.closingIssuesReferences.nodes || [];

            // Fallback: also parse #123 in title/body
            const text = (prData.repository.pullRequest.title || '') + '\n' + (prData.repository.pullRequest.body || '');
            const numsFromText = [...new Set((text.match(/#(\d+)/g) || []).map(s => +s.slice(1)))];
            const issueNumbers = [...new Set([...closingIssues.map(i => i.number), ...numsFromText])];

            // Map issue number -> project item
            const issueItems = [];
            for (const num of issueNumbers) {
              const it = items.find(n => n.content?.__typename === 'Issue' && n.content.number === num);
              if (it) issueItems.push({ num, itemId: it.id });
            }

            // 4) If (isMerged) we delete regardless.
            //    If (isReview APPROVED) only delete when Issue Status == Done.
            let canDeleteNow = isMerged;

            if (!canDeleteNow) {
              // Check if *every* linked issue is Status=Done (or at least one? choose your policy)
              // Here: delete when **all** linked issues are Done.
              let allDone = issueItems.length > 0;
              for (const it of issueItems) {
                const st = await getStatusOptionId(project.id, it.itemId, statusField.name);
                if (!st || st.optionId !== doneOpt.id) { allDone = false; break; }
              }
              canDeleteNow = allDone;
            }

            if (!canDeleteNow) {
              core.info('Conditions not met (not merged, or linked issues not all Done). Skipping deletion.');
              return;
            }

            // 5) Delete PR item and linked issue items from the project
            try {
              if (prItem) {
                await deleteItem(project.id, prItem.id);
                core.info(`Removed PR #${pr.number} from project.`);
              }
              for (const it of issueItems) {
                await deleteItem(project.id, it.itemId);
                core.info(`Removed Issue #${it.num} from project.`);
              }
            } catch (e) {
              core.warning(`Deletion failed: ${e.message}`);
            }
