name: Delete Old Workflow Runs
on:
  workflow_dispatch: # you trigger manually
  schedule:
       - cron: "0 0 * * *"

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const repo = context.repo;
            const cutoff = Date.now() - 24 * 60 * 60 * 1000; // 1 day in ms

            let page = 1;
            let totalDeleted = 0;
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                ...repo,
                per_page: 100,
                page
              });
              if (data.workflow_runs.length === 0) break;

              for (const run of data.workflow_runs) {
                const created = new Date(run.created_at).getTime();
                if (created < cutoff) {
                  await github.rest.actions.deleteWorkflowRun({
                    ...repo,
                    run_id: run.id
                  });
                  totalDeleted++;
                  core.info(`Deleted run ${run.id} (${run.name}) from ${run.created_at}`);
                }
              }
              page++;
            }
            core.info(`✅ Deleted ${totalDeleted} runs older than 1 day.`);
