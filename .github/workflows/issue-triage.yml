name: Issue Triage
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const repo = context.repo;
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();

            function has(key){ return title.includes(key) || body.includes(key); }
            const labels = [];
            if (has('[feature]')) labels.push('feature');
            if (has('[bug]')) labels.push('bug');
            if (has('[refactor]')) labels.push('refactor');

            if (labels.length) {
              await github.rest.issues.addLabels({ ...repo, issue_number: issue.number, labels });
            }

            // Add to ProjectV2 (adjust ID)
            const projectId = 'PVT_kwHOBFQM7s4A_i9k';
            await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input:{ projectId:$projectId, contentId:$contentId }) {
                  item { id }
                }
              }`, { projectId, contentId: issue.node_id });
