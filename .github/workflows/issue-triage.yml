name: Issue Triage

on:
  issues:
    types: [opened, reopened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - name: Auto-triage new or updated issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN }}
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body.toLowerCase();
            const issue_number = context.issue.number;
            const issue_id = context.payload.issue.node_id;
            const projectId = 'PVT_kwHOBFQM7s4A_i9k';

            // --- Label assignment based on title ---
            const labels = [];
            if (title.includes('[feature]')) labels.push('feature');
            if (title.includes('[bug]')) labels.push('bug');
            if (title.includes('[refactor]')) labels.push('refactor');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number,
                labels,
              });
            }

            // --- Parse fields from description ---
            let priority = null;
            if (body.includes('[importance:] urgent') || body.includes('{p0}')) priority = 'P0';
            else if (body.includes('[importance:] main') || body.includes('{p1}')) priority = 'P1';
            else if (body.includes('[importance:] sidetrack') || body.includes('{p2}')) priority = 'P2';
            else if (body.includes('[importance:] overlooked') || body.includes('{p3}')) priority = 'P3';

            let size = null;
            if (body.includes('[duration:] 1 day')) size = 'Fast';
            else if (body.includes('[duration:] 3 days')) size = '1-3 Days';
            else if (body.includes('[duration:] 5 days')) size = 'Up to 5 days';
            else if (body.includes('[duration:] 1 week')) size = '1 Week';
            else if (body.includes('[duration:] 2 weeks')) size = '2 Weeks and above';

            // --- Check if issue is already in project ---
            const projectQuery = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId });

            let itemId;
            const items = projectQuery.node.items.nodes;
            const existingItem = items.find(item => item.content?.id === issue_id);
            if (existingItem) {
              itemId = existingItem.id;
            } else {
              const added = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {
                    projectId: $projectId,
                    contentId: $contentId
                  }) {
                    item { id }
                  }
                }
              `, {
                projectId,
                contentId: issue_id
              });
              itemId = added.addProjectV2ItemById.item.id;
            }

            // --- Always set status to Backlog ---
            await github.graphql(`
              mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                updateProjectV2ItemFieldValue(input: $input) {
                  projectV2Item { id }
                }
              }
            `, {
              input: {
                projectId,
                itemId,
                fieldId: 'PVTSSF_lAHOBFQM7s4A_i9kzgyndCQ', // Status
                value: {
                  singleSelectOptionId: 'f75ad846' // "Backlog"
                }
              }
            });

            // --- Set Priority and Size fields ---
            const fieldMappings = {
              'Priority': {
                'P0': '79628723',
                'P1': '0a877460',
                'P2': 'da944a9c',
                'P3': 'a888e353',
              },
              'Size': {
                'Fast': '6c6483d2',
                '1-3 Days': 'f784b110',
                'Up to 5 days': '7515a9f1',
                '1 Week': '817d0097',
                '2 Weeks and above': 'db339eb2',
              }
            };

            const fieldIds = {
              'Priority': 'PVTSSF_lAHOBFQM7s4A_i9kzgyndEA',
              'Size': 'PVTSSF_lAHOBFQM7s4A_i9kzgyndEE'
            };

            const updateField = async (fieldName, value) => {
              if (!value) return;
              const fieldId = fieldIds[fieldName];
              const optionId = fieldMappings[fieldName][value];
              if (!optionId) return;

              await github.graphql(`
                mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                  updateProjectV2ItemFieldValue(input: $input) {
                    projectV2Item { id }
                  }
                }
              `, {
                input: {
                  projectId,
                  itemId,
                  fieldId,
                  value: {
                    singleSelectOptionId: optionId
                  }
                }
              });
            };

            await updateField('Priority', priority);
            await updateField('Size', size);