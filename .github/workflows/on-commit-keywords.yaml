name: On Commit Keywords

on:
  push:
    branches-ignore:
      - main

jobs:
  commit-hook:
    runs-on: ubuntu-latest

    steps:
      - name: Check commit message and update Kanban
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN }}
          script: |
            const message = context.payload.head_commit.message;
            const projectId = 'PVT_kwHOBFQM7s4A_i9k';
            const statusFieldId = 'PVTSSF_lAHOBFQM7s4A_i9kzgyndCQ';

            const matchNew = message.match(/\[new\]\s*\[#(\d+)\]/i);
            const matchEnd = message.match(/\[end\]\s*\[#(\d+)\]/i);

            const issueNumber = matchNew?.[1] || matchEnd?.[1];
            if (!issueNumber) {
              console.log("No issue reference in latest commit.");
              return;
            }

            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: issueNumber
            });

            const issueId = issue.node_id;

            // Get current project status
            const { data: projectItem } = await github.graphql(`
              query($projectId: ID!, $issueId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 50, filterBy: {contentId: $issueId}) {
                      nodes {
                        id
                        fieldValues(first: 10) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field {
                                ... on ProjectV2FieldCommon { name }
                              }
                              optionId
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              projectId,
              issueId,
            });

            const item = projectItem.node.items.nodes[0];
            const status = item?.fieldValues?.nodes?.find(f => f.field.name === "Status")?.optionId;

            const IN_PROGRESS = '47fc9ee4';
            const IN_REVIEW = 'df73e18b';

            // [NEW] → Move to "In progress"
            if (matchNew && status !== IN_PROGRESS) {
              await github.graphql(`
                mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                  updateProjectV2ItemFieldValue(input: $input) {
                    projectV2Item { id }
                  }
                }
              `, {
                input: {
                  projectId,
                  itemId: issueId,
                  fieldId: statusFieldId,
                  value: {
                    singleSelectOptionId: IN_PROGRESS
                  }
                }
              });
              console.log("Moved issue to In Progress.");
            }

            // [END] → Move to "In review" and open PR
            if (matchEnd) {
              await github.graphql(`
                mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                  updateProjectV2ItemFieldValue(input: $input) {
                    projectV2Item { id }
                  }
                }
              `, {
                input: {
                  projectId,
                  itemId: issueId,
                  fieldId: statusFieldId,
                  value: {
                    singleSelectOptionId: IN_REVIEW
                  }
                }
              });

              const branchName = context.ref.replace('refs/heads/', '');

              await github.rest.pulls.create({
                ...context.repo,
                head: branchName,
                base: 'main', // Or your default branch
                title: `PR for #${issueNumber}`,
                body: `Closes #${issueNumber}`
              });

              console.log("Moved to In Review and opened PR.");
            }
