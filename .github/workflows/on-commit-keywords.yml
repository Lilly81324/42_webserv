name: On Commit Keywords
on:
  push:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  parse-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const repo = context.repo;

            // Get the latest commit on this push (head commit)
            const commit = context.payload.head_commit;
            if (!commit) { console.log('No head_commit'); return; }
            const message = commit.message || '';
            const newMatch = message.match(/\[New\]\s*\[#(\d+)\]/i);
            const endMatch = message.match(/\[END\]\s*\[#(\d+)\]/i);
            const issueNumber = +(newMatch?.[1] || endMatch?.[1] || 0);
            if (!issueNumber) { console.log('No issue reference found'); return; }

            // Project config
            const projectId = 'PVT_kwHOBFQM7s4A_i9k';
            const statusFieldId = 'PVTSSF_lAHOBFQM7s4A_i9kzgyndCQ';
            const statusOptionId_InProgress = '47fc9ee4'; 
            const statusOptionId_InReview   = 'df73e18b';

            // Helper: find item id for the issue in the project
            async function findItemId(issueNodeId) {
              const q = await github.graphql(`
                query($pid: ID!) {
                  node(id:$pid){ ... on ProjectV2 {
                    items(first:100){ nodes{ id content{... on Issue{ id number }} } }
                  } }
                }`, { pid: projectId });
              const item = q.node.items.nodes.find(n => n.content?.id === issueNodeId);
              return item?.id;
            }

            const { data: issue } = await github.rest.issues.get({ ...repo, issue_number: issueNumber });
            const itemId = await findItemId(issue.node_id);
            if (!itemId) { console.log('Issue not in project'); return; }

            if (newMatch) {
              await github.graphql(`
                mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                  updateProjectV2ItemFieldValue(input:$input){ projectV2Item{ id } }
                }`, {
                input: {
                  projectId, itemId, fieldId: statusFieldId,
                  value: { singleSelectOptionId: statusOptionId_InProgress }
                }
              });
              console.log('Moved to In Progress');
            }

            if(endMatch){
                    await github.graphql(`
                        mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                        updateProjectV2ItemFieldValue(input:$input){ projectV2Item{ id } }
                        }`, {
                        input: {
                        projectId, itemId, fieldId: statusFieldId,
                        value: { singleSelectOptionId: statusOptionId_InReview } // e.g. 'df73e18b'
                        }
                    });
                    console.log('Moved to In Review');
                    const assignees = (issue.assignees || []).map(a => a.login);
                    if (!assignees.length) return; // nothing to do

                    const branchPrefix = `${issue.number}_`; // you can include assignee if you want: `${issue.number}_${assignees[0]}`
                    // List branches (paginate)
                    const branches = [];
                    for (let page = 1; ; page++) {
                        const { data } = await github.rest.repos.listBranches({ ...repo, per_page: 100, page });
                        branches.push(...data);
                        if (data.length < 100) break;
                    }
                    const match = branches.find(b => b.name.startsWith(branchPrefix));
                    if (!match) { console.log(`No branch found starting with ${branchPrefix}`); return; }

                    const BASE_BRANCH = 'development';
                      const existing = await github.rest.pulls.list({
                        ...repo,
                        state: 'open',
                        head: `${repo.owner}:${match.name}`,
                        base: BASE_BRANCH
                    });
                    if (existing.data.length) {
                        console.log(`PR already exists: #${existing.data[0].number}`);
                        return;
                    }
                    const prOpenUrl =
                    `https://github.com/${repo.owner}/${repo.repo}/compare/${encodeURIComponent(BASE_BRANCH)}...${encodeURIComponent(match.name)}` +
                    `?expand=1&title=${encodeURIComponent('[#' + issue.number + '] ' + issue.title)}` +
                    `&body=${encodeURIComponent('Closes #' + issue.number)}`;

                await github.rest.issues.createComment({
                    ...repo,
                    issue_number: issue.number,
                    body:
                    `🧩 Open a PR from this branch:\n` +
                    `[Create Pull Request](${prOpenUrl})\n\n` +
                    `This keeps **you** as the PR author.`
                });
            }
