name: On Issue Assigned
on:
  issues:
    types: [assigned]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  assign-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Create branch & move to Ready
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const labels = context.payload.issue.labels.map(label => label.name.toLowerCase());
            const validLabels = ['feature', 'bug', 'refactor'];
            const issue_number = context.issue.number;
            const issue_id = context.payload.issue.node_id;
            if (!labels.some(l => validLabels.includes(l))) {
              console.log("Issue doesn't have a valid label. Skipping.");
              return;
            }
            const assignee = context.payload.assignee.login;
            const branchName = `${issue_number}_${assignee}`.toLowerCase();
            const repo = context.repo;

            // Get 'developer' branch SHA
            const baseRef = await github.rest.git.getRef({ ...repo, ref: 'heads/developer' });

            // Create branch if it does not exist
            try {
              await github.rest.git.getRef({ ...repo, ref: `heads/${branchName}` });
              console.log('Branch already exists; skipping createRef');
            } catch {
              await github.rest.git.createRef({
                ...repo,
                ref: `refs/heads/${branchName}`,
                sha: baseRef.data.object.sha,
              });
              console.log(`Branch created: ${branchName}`);
            }

            // Comment on the issue with link + checkout command
            const branchUrl = `https://github.com/${repo.owner}/${repo.repo}/tree/${branchName}`;
            await github.rest.issues.createComment({
              ...repo,
              issue_number,
              body:
                `🚀 Branch created: [\`${branchName}\`](${branchUrl})\n\n` +
                "To check out this branch locally:\n" +
                "```bash\n" +
                `git fetch && git checkout ${branchName}\n` +
                "```"
            });

            // === ProjectV2 move to Ready ===
            const projectId = 'PVT_kwHOBFQM7s4A_i9k';
            const statusFieldId = 'PVTSSF_lAHOBFQM7s4A_i9kzgyndCQ';
            const statusOptionId_Ready = '61e4505c';

            const projectQuery = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 200) {
                      nodes {
                        id
                        content { ... on Issue { id } }
                      }
                    }
                  }
                }
              }
            `, { projectId });

            let itemId;
            const items = projectQuery.node.items.nodes;
            const existingItem = items.find(item => item.content?.id === issue_id);
            if (existingItem) {
              itemId = existingItem.id;
            } else {
              const added = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item { id }
                  }
                }
              `, { projectId, contentId: issue_id });
              itemId = added.addProjectV2ItemById.item.id;
            }

            await github.graphql(`
              mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                updateProjectV2ItemFieldValue(input: $input) {
                  projectV2Item { id }
                }
              }
            `, {
              input: {
                projectId,
                itemId,
                fieldId: statusFieldId,
                value: { singleSelectOptionId: statusOptionId_Ready }
              }
            });
