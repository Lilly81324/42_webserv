name: PR merged housekeeping
on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:

    done-and-clean:
        if: github.event.pull_request.merged == true && contains(fromJson('["main","development"]'), github.event.pull_request.base.ref)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/github-script@v7
              with:
                    github-token: ${{ secrets.GL_TOKEN || github.token }}
                    script: |
                        const pr = context.payload.pull_request;
                        const repo = context.repo;
                                    // Only delete head branch (if not from fork)
                                    if (!pr.head.repo.fork) {
                                        try {
                                            // Delete branch on GitHub (remote)
                                            await github.rest.git.deleteRef({ ...repo, ref: `heads/${pr.head.ref}` });
                                            // Also delete branch from local origin if runner has push access
                                            const execSync = require('child_process').execSync;
                                            try {
                                                execSync(`git push origin --delete ${pr.head.ref}`, { stdio: 'inherit' });
                                            } catch (e) {
                                                core.warning(`Remote origin branch delete failed: ${e.message}`);
                                            }
                                        } catch (e) {
                                            core.warning(`Delete ref skipped: ${e.message}`);
                                        }
                                    }
