name: PR merged housekeeping
on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  done-and-clean:
    if: github.event.pull_request.merged == true && contains(fromJson('["main","developer"]'), github.event.pull_request.base.ref)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const pr = context.payload.pull_request;
            const repo = context.repo;

            // Delete head branch if not from fork
            if (!pr.head.repo.fork) {
              try { await github.rest.git.deleteRef({ ...repo, ref: `heads/${pr.head.ref}` }); }
              catch (e) { core.warning(`Delete ref skipped: ${e.message}`); }
            }

            // Move linked issues to Done (fill the IDs below)
            const projectId = 'PVT_kwHOBFQM7s4A_i9k';
            const statusFieldId = 'PVTSSF_lAHOBFQM7s4A_i9kzgyndCQ';
            const statusOptionId_Done = 'xxxxxxxx_done'; // TODO: fill

            const matchAll = (pr.title + '\n' + (pr.body||'')).match(/#(\d+)/g) || [];
            const issueNumbers = [...new Set(matchAll.map(x => +x.slice(1)))];
            for (const num of issueNumbers) {
              const { data: issue } = await github.rest.issues.get({ ...repo, issue_number: num });
              const q = await github.graphql(`
                query($pid:ID!){
                  node(id:$pid){ ... on ProjectV2 {
                    items(first:100){ nodes{ id content{... on Issue{ id number }} } }
                  } }
                }`, { pid: projectId });
              const item = q.node.items.nodes.find(n => n.content?.number === num);
              if (!item) continue;
              await github.graphql(`
                mutation($input: UpdateProjectV2ItemFieldValueInput!){
                  updateProjectV2ItemFieldValue(input:$input){ projectV2Item{ id } }
                }`, {
                input: {
                  projectId, itemId: item.id, fieldId: statusFieldId,
                  value: { singleSelectOptionId: statusOptionId_Done }
                }
              });
              await github.rest.issues.createComment({
                ...repo,
                issue_number: num,
                body: `✅ Merged via PR #${pr.number} into \`${pr.base.ref}\`. Marked as **Done**.`
              });
            }
