name: Add PRs to Project
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  add-pr-item:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const pr = context.payload.pull_request;
            const repo = context.repo;

            // --- CONFIG ---
            const ORG = 'YOUR_ORG_OR_USER';
            const PROJECT_NUMBER = 1;
            const STATUS_FIELD_NAME = 'Status';
            const PR_OPTION_NAME    = 'Pull Requests'; // your Status option
            // --------------

            // 1) Resolve project + Status field and "Pull Requests" option
            const projQ = `
              query($org:String!, $number:Int!){
                organization(login:$org){
                  projectV2(number:$number){
                    id
                    fields(first:100){
                      nodes{
                        __typename
                        ... on ProjectV2SingleSelectField { id name options { id name } }
                      }
                    }
                  }
                }
              }`;
            const data = await github.graphql(projQ, { org: ORG, number: PROJECT_NUMBER });
            const project = data.organization.projectV2;
            const statusField = project.fields.nodes.find(f => f && f.__typename === 'ProjectV2SingleSelectField' && f.name === STATUS_FIELD_NAME);
            if (!statusField) throw new Error(`Field "${STATUS_FIELD_NAME}" not found`);
            const prOpt = statusField.options.find(o => o.name === PR_OPTION_NAME);
            if (!prOpt) throw new Error(`Option "${PR_OPTION_NAME}" not found in field "${STATUS_FIELD_NAME}"`);

            // 2) Add PR as an item (idempotent-ish: adding twice creates only one)
            const addRes = await github.graphql(`
              mutation($projectId:ID!, $contentId:ID!){
                addProjectV2ItemById(input:{ projectId:$projectId, contentId:$contentId }) {
                  item { id }
                }
              }`, { projectId: project.id, contentId: pr.node_id });
            const itemId = addRes.addProjectV2ItemById.item.id;

            // 3) Set PR item Status = "Pull Requests"
            await github.graphql(`
              mutation($input: UpdateProjectV2ItemFieldValueInput!){
                updateProjectV2ItemFieldValue(input:$input){ projectV2Item{ id } }
              }`, {
              input: {
                projectId: project.id,
                itemId,
                fieldId: statusField.id,
                value: { singleSelectOptionId: prOpt.id }
              }
            });

            core.info(`PR #${pr.number} added to project and set to "${PR_OPTION_NAME}".`);
