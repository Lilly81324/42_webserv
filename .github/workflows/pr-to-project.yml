name: Add PRs to Project
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  add-pr-item:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GL_TOKEN || github.token }}
          script: |
            const login = core.getInput('owner') || context.repo.owner;   // org or user
                const number = parseInt(core.getInput('project_number') || '1', 10);

                const query = `
                    query($login:String!, $number:Int!){
                    repositoryOwner(login:$login){
                        __typename
                        ... on Organization {
                        projectV2(number:$number){
                            id
                            fields(first:100){
                            nodes {
                                __typename
                                ... on ProjectV2SingleSelectField {
                                id
                                name
                                options { id name }
                                }
                            }
                            }
                        }
                        }
                        ... on User {
                        projectV2(number:$number){
                            id
                            fields(first:100){
                            nodes {
                                __typename
                                ... on ProjectV2SingleSelectField {
                                id
                                name
                                options { id name }
                                }
                            }
                            }
                        }
                        }
                    }
                    }`;

                const res = await github.graphql(query, { login, number });

                const ownerNode = res.repositoryOwner;
                if (!ownerNode || !ownerNode.projectV2) {
                    throw new Error(`ProjectV2 #${number} not found under owner '${login}' (type=${ownerNode && ownerNode.__typename})`);
                }

                const projectId = ownerNode.projectV2.id;
                core.info(`ProjectV2 id: ${projectId}`);
                core.setOutput('projectId', projectId);
