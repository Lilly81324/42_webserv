name: Add PRs to Project

on:
  # pull_request_target runs in the base repo context (good for org Projects)
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  add-pr-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          # Prefer a PAT with org Project write in GL_TOKEN; fallback to GITHUB_TOKEN
          github-token: ${{ secrets.GL_TOKEN != '' && secrets.GL_TOKEN || github.token }}
          script: |
            const pr = context.payload.pull_request;

            // --- CONFIG (edit if your field name differs) ---
            const PROJECT_ID = 'PVT_kwHOBFQM7s4A_i9k'; // your ProjectV2 node ID
            const STATUS_FIELD_NAME = 'Status';          // field that contains the "Pull Requests" option
            const TARGET_OPTION_NAME = 'Pull Requests';  // the option to set
            // -------------------------------------------------

            // 1) Fetch the Project fields and find the Status field + "Pull Requests" option
            const projQ = `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        __typename
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }`;
            const projData = await github.graphql(projQ, { projectId: PROJECT_ID });
            const project = projData.node;
            if (!project) throw new Error('Project not found by ID');

            const statusField = project.fields.nodes.find(
              f => f && f.__typename === 'ProjectV2SingleSelectField' && f.name === STATUS_FIELD_NAME
            );
            if (!statusField) {
              throw new Error(`Field "${STATUS_FIELD_NAME}" not found on project "${project.title}".`);
            }

            const targetOption = statusField.options.find(o => o.name === TARGET_OPTION_NAME);
            if (!targetOption) {
              throw new Error(`Option "${TARGET_OPTION_NAME}" not found in field "${STATUS_FIELD_NAME}".`);
            }

            // 2) Add the PR as an item to the project (idempotent server-side)
            const addItemRes = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, { projectId: PROJECT_ID, contentId: pr.node_id });

            const itemId = addItemRes.addProjectV2ItemById.item.id;

            // 3) Set Status = "Pull Requests"
            await github.graphql(`
              mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                updateProjectV2ItemFieldValue(input: $input) {
                  projectV2Item { id }
                }
              }
            `, {
              input: {
                projectId: PROJECT_ID,
                itemId,
                fieldId: statusField.id,
                value: { singleSelectOptionId: targetOption.id }
              }
            });

            core.info(`PR #${pr.number} added to "${project.title}" and set to "${TARGET_OPTION_NAME}".`);
