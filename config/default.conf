server {
    listen 0.0.0.0:8080;
    server_name example.com www.example.com;
    root /var/www/html;
    index index.html index.htm;
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        root /var/www/html/root;
        index home.html main.html;
        autoindex on;
        methods GET POST DELETE;
    }

    location /static {
        root /var/www/html/static;
        index static.html;
        autoindex off;
        methods GET;
    }

    location /upload {
        root /var/www/html/upload;
        index upload.html;
        autoindex off;
        methods POST;
    }
}

server {
    listen 127.0.0.1 8081;
    server_name localhost;
    root /srv/www;
    index index.php;
    error_page 403 /errors/403.html;

    location /admin {
        root /srv/www/admin;
        index admin.html;
        autoindex off;
        methods GET POST;
    }
}

server {
    listen 127.0.0.1:8079;
    server_name intranet;
    root /srv/intranet;
    index intranet.html;
    error_page 502 /errors/502.html;

    location /api {
        root /srv/intranet/api;
        index api.html;
        autoindex on;
        methods GET POST DELETE;
    }
}