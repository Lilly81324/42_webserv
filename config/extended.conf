
types {
  html text/html;
  htm  text/html;
  css  text/css;
  js   application/javascript;
  json application/json;
  png  image/png;
  jpg  image/jpeg;
  jpeg image/jpeg;
  gif  image/gif;
  svg  image/svg+xml;
  txt  text/plain;
}

# Global CGI mappings (extension -> interpreter + timeout)
cgi .php /usr/bin/php-cgi 3000;
cgi .py  /usr/bin/python3  3000;


# Optional upstream pool (used by /api below)
upstream api_pool {
  server 127.0.0.1:9000 weight=2;
  server 127.0.0.1:9001;
  health_path /healthz;
  health_interval_ms 3000;
  strategy roundrobin;
}


server {
  listen 127.0.0.1:8080;
  server_name localhost;

  # Serve from your project folder
  root  ./www;
  index index.html index.htm;

  client_body_temp_path /tmp/webserv_bodies;
  client_max_body_size 10485760;

  # If these exist under ./www/errors/, they will be served
  error_page 404 /errors/404.html;
  error_page 500 /errors/500.html;

  # -------- Root site --------
  location / {
    # inherits root ./www
    index index.html;        # ensure / serves ./www/index.html
    autoindex on;

 
    methods GET;
    try_files $uri $uri/ =404;
    generate_etag on;
  }

  # -------- Also serve /www/... from ./www --------
  # (So /www/ and /www/index.html hit ./www/index.html)
  location /www {
    root ./www;
    index index.html;
    autoindex on;
    methods GET ;
  }

  # -------- Static assets --------
  # Place files under: ./www/static/...
  location /static {
    root ./www/static;
    index index.html;
    autoindex off;
    methods GET;
  }

  # -------- Simple uploads endpoint (POST) --------
  # Place uploaded files under: ./www/upload/ (handler controls final path)
  location /upload {
    root ./www/upload;
    methods POST;
    client_max_body_size 5242880;
    autoindex off;
  }

  # -------- Redirect example --------
  location /old {
    return 301 /new;
  }

  # -------- Local-only area --------
  location /internal {
    allow 127.0.0.1;
    deny  all;
    methods GET;
  }

  # -------- CGI area --------
  # Put scripts in: ./www/cgi/ (e.g., ./www/cgi/test.py)
  location /cgi-bin {
    root ./www/cgi;
    methods GET POST;
    cgi .py;                 # uses global python mapping
    autoindex off;
  }

  # -------- Proxy example --------
  # Works if proxy/upstream is enabled in your build
  location /api {
    methods GET POST DELETE;
    proxy_pass api_pool;
    autoindex off;
  }
}


