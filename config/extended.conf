types {
  html text/html;
  htm  text/html;
  css  text/css;
  js   application/javascript;
  json application/json;
  p_append application/vnd.webserv.append;
  p_overwrite application/vnd.webserv.overwrite;
  png  image/png;
  jpg  image/jpeg;
  jpeg image/jpeg;
  gif  image/gif;
  svg  image/svg+xml;
  txt  text/plain;
}

# Global CGI mappings (extension -> interpreter + timeout)
cgi .php /usr/bin/php-cgi 3000;
cgi .py  /usr/bin/python3  3000;

# Optional upstream pool for /api
upstream api_pool {
  server 127.0.0.1:9000 weight=2;
  server 127.0.0.1:9001;
  health_path /healthz;
  health_interval_ms 3000;
  strategy roundrobin;
}

server {
  listen 127.0.0.1:8080;
  server_name localhost;

  root  ./www;
  index index.html index.htm;

  client_body_temp_path /tmp/webserv_bodies;
  client_max_body_size 10485760;

  # If these exist under ./www/errors/, they will be served
  error_page 404 /errors/404.html;
  error_page 500 /errors/500.html;

  location / {
    index index.html;
    autoindex on;
    methods GET;
    try_files $uri $uri/ =404;
    generate_etag on;
  }

  # Mirror: /www/... serves from the same ./www
  location /www {
    root ./www;
    index index.html;
    autoindex on;
    methods GET;
    try_files $uri $uri/ =404;
    generate_etag on;
  }

  # -------- Static assets --------
  # Place files under: ./www/static/...
  location /static {
    root ./www/static;
    index index.html;
    autoindex off;
    methods GET;
    try_files $uri =404;
  }

  location /upload {
    root ./www/upload;
    methods POST;
    client_max_body_size 5242880;
    autoindex off;
  }

  location /old { return 301 /new; }

  location /internal {
    allow 127.0.0.1;
    deny  all;
    methods GET;
  }

  location /cgi-bin {
    root ./www/cgi;
    methods GET POST;
    cgi .py;
    cgi .php;
    autoindex off;
    try_files $uri =404;
  }

  location /api {
    methods GET POST DELETE;
    proxy_pass api_pool;
    autoindex off;
  }
}
