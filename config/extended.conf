# ===== Global (server-config) scope =====
# MIME types used to set Content-Type
types {
  html text/html;
  htm  text/html;
  css  text/css;
  js   application/javascript;
  json application/json;
  png  image/png;
  jpg  image/jpeg;
  jpeg image/jpeg;
  gif  image/gif;
  svg  image/svg+xml;
  txt  text/plain;
}

# Default CGI handlers (can be overridden per location)
# syntax: cgi <.ext> <binary> <timeout_ms>;
cgi .php /usr/bin/php-cgi 3000;
cgi .py  /usr/bin/python3  3000;

# Optional session/cookie management
session on;
session_cookie_name sessionid;
session_max_age 86400;
session_secure off;
session_http_only on;
session_same_site Lax;

# ---------- Upstream pools (reverse proxy) ----------
upstream api_pool {
  server 127.0.0.1:9000 weight=2;
  server 127.0.0.1:9001;
  health_path /healthz;
  health_interval_ms 3000;
  strategy roundrobin;
}

# ===== Server #1: public site =====
server {
  listen 0.0.0.0:8080;
  server_name example.com www.example.com;

  # Server-level defaults (overridden by locations)
  root  /var/www/html;
  index index.html index.htm;

  # Where to buffer large request bodies before processing
  client_body_temp_path /tmp/webserv_bodies;

  # Max allowed request body (413 if exceeded)
  client_max_body_size 10485760; # 10 MiB

  # Custom error pages
  error_page 404 /errors/404.html;
  error_page 500 /errors/500.html;

  # ---------- Static site root ----------
  location / {
    # Location-specific document root & indexes
    root /var/www/html/root;
    index home.html main.html;

    # Directory listing when no index is present
    autoindex on;

    # Allow methods
    methods GET;

    # Try common fallbacks (single-page app style), else 404
    try_files $uri $uri/ /fallback.html =404;

    # Optional: generate ETag for static responses
    generate_etag on;
  }

  # ---------- Static assets ----------
  location /static {
    root /var/www/html/static;
    index static.html;
    autoindex off;
    methods GET;

    # Light rate limiting for hot paths
    limit_req requests=120 burst=40 on;
  }

  # ---------- File uploads ----------
  location /upload {
    root /var/www/html/upload;
    methods POST;

    # Store incoming bodies as files here (POST)
    upload_dir /var/www/html/upload/incoming;

    # Stricter body size for this location
    client_max_body_size 5242880; # 5 MiB
    autoindex off;
  }

  # ---------- Simple redirects / returns ----------
  location /old {
    return 301 /new;
  }

  # ---------- Access control sample ----------
  location /internal {
    allow 127.0.0.1;
    deny  all;
    methods GET;
  }

  # ---------- CGI by extension (overrides or augments global) ----------
  location /cgi-bin {
    root /var/www/html/cgi;
    methods GET POST;

    # Override/add a handler locally
    cgi .pl /usr/bin/perl 3000;

    # Example: /cgi-bin/hello.php executes via php-cgi
    autoindex off;
  }

  # ---------- Reverse proxy to upstream pool ----------
  location /api {
    methods GET POST DELETE;
    proxy_pass api_pool;        # mark Location as proxy + select pool
    limit_req requests=300 burst=100 on;
    autoindex off;
  }
}

# ===== Server #2: admin app =====
server {
  listen 127.0.0.1 8081;
  server_name localhost;

  root  /srv/www;
  index index.php;
  error_page 403 /errors/403.html;

  location /admin {
    root /srv/www/admin;
    index admin.html;
    autoindex off;
    methods GET POST;

    # Require local access
    allow 127.0.0.1;
    deny  all;
  }

  # Optional CGI for PHP here instead of global
  location ~ \.php$ {
    # (Regex matching optional; otherwise rely on cgi .php mapping)
    methods GET POST;
  }
}

# ===== Server #3: intranet/API =====
server {
  listen 127.0.0.1:8079;
  server_name intranet;

  root  /srv/intranet;
  index intranet.html;
  error_page 502 /errors/502.html;

  location /api {
    root /srv/intranet/api;
    index api.html;
    autoindex on;
    methods GET POST DELETE;

    # PUT/PATCH enabled here with ETag generation
    allow_put on;
    allow_patch on;
    generate_etag on;
  }
}