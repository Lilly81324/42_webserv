
types {
  html text/html;
  htm  text/html;
  css  text/css;
  js   application/javascript;
  json application/json;
  png  image/png;
  jpg  image/jpeg;
  jpeg image/jpeg;
  gif  image/gif;
  svg  image/svg+xml;
  txt  text/plain;
}

cgi .php /usr/bin/php-cgi 3000;
cgi .py  /usr/bin/python3  3000;

session on;
session_cookie_name sessionid;
session_max_age 86400;
session_secure off;
session_http_only on;
session_same_site Lax;

upstream api_pool {
  server 127.0.0.1:9000 weight=2;
  server 127.0.0.1:9001;
  health_path /healthz;
  health_interval_ms 3000;
  strategy roundrobin;
}

server {
  listen 0.0.0.0:8080;
  server_name example.com www.example.com;

  root  /var/www/html;
  index index.html index.htm;

  client_body_temp_path /tmp/webserv_bodies;
  client_max_body_size 10485760;

  error_page 404 /errors/404.html;
  error_page 500 /errors/500.html;

  location / {
    root /var/www/html/root;
    index home.html main.html;
    autoindex on;
    methods GET;
    try_files $uri $uri/ /fallback.html =404;
    generate_etag on;
  }

  location /static {
    root /var/www/html/static;
    index static.html;
    autoindex off;
    methods GET;
    limit_req requests=120 burst=40 on;
  }

  location /upload {
    root /var/www/html/upload;
    methods POST;
    upload_dir /var/www/html/upload/incoming;
    client_max_body_size 5242880;
    autoindex off;
  }

  location /old {
    return 301 /new;
  }

  location /internal {
    allow 127.0.0.1;
    deny  all;
    methods GET;
  }

  location /cgi-bin {
    root /var/www/html/cgi;
    methods GET POST;
    cgi .pl /usr/bin/perl 3000;
    cgi .py;                 # use global default bin/timeout for .py
    autoindex off;
  }

  location /api {
    methods GET POST DELETE;
    proxy_pass api_pool;
    limit_req requests=300 burst=100 on;
    autoindex off;
  }
}

server {
  listen 127.0.0.1 8081;
  server_name localhost;

  root  /srv/www;
  index index.php;
  error_page 403 /errors/403.html;

  location /admin {
    root /srv/www/admin;
    index admin.html;
    autoindex off;
    methods GET POST;
    allow 127.0.0.1;
    deny  all;
  }

  # Ensure CGI is selected for PHP by declaring the ext in this location
  location ~ \.php$ {
    methods GET POST;
    cgi .php;   # uses global defaults (/usr/bin/php-cgi 3000)
  }
}

server {
  listen 127.0.0.1:8079;
  server_name intranet;

  root  /srv/intranet;
  index intranet.html;
  error_page 502 /errors/502.html;

  location /api {
    root /srv/intranet/api;
    index api.html;
    autoindex on;
    methods GET POST DELETE;
    allow_put on;
    allow_patch on;
    generate_etag on;
  }
}
