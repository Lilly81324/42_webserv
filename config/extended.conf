types {
  html text/html;
  htm  text/html;
  css  text/css;
  js   application/javascript;
  json application/json;
  p_append application/vnd.webserv.append;
  p_overwrite application/vnd.webserv.overwrite;
  png  image/png;
  jpg  image/jpeg;
  jpeg image/jpeg;
  gif  image/gif;
  svg  image/svg+xml;
  txt  text/plain;
}

# Global CGI mappings (extension -> interpreter + timeout)
cgi .php /usr/bin/php-cgi 3000;
cgi .py  /usr/bin/python3  3000;
cgi .cgi  /usr/bin/bash  3000;

# Optional upstream pool for /api
upstream api_pool {
  server 127.0.0.1:9000 weight=2;
  server 127.0.0.1:9001;
  health_path /healthz;
  health_interval_ms 3000;
  strategy roundrobin;
}

server {
  listen 127.0.0.1:8080;
  server_name localhost;

  root  ./www;
  index index.html index.htm;

  # client_body_temp_path /tmp/webserv_bodies;
  # client_max_body_size 10485760;

  client_body_temp_path /tmp;
  client_max_body_size 65536;


  error_page 403 /errors/403.html;
  error_page 404 /errors/404.html;
  error_page 500 /errors/500.html;


  location / {
    index index.html;
    autoindex on;
    methods GET;
    try_files $uri $uri/ =404;
    generate_etag on;
  }

  # Mirror: /www/... serves from the same ./www
  location /www {
    # root ./www;
    index index.html;
    autoindex on;
    methods GET;
    # try_files $uri $uri/ =404;
    generate_etag on;
  }

  location /static {
    root ./www/static;
    index index.html;
    autoindex off;
    methods GET;
    try_files $uri =404;
  }

    # === CGI location (PUT YOUR SCRIPTS IN ./www/cgi/) ===
  location /cgi/ {
    root ./www;                      # /cgi/hello.py -> ./www/cgi/hello.py
    methods GET POST;
    client_max_body_size 65536;

    cgi .py  /usr/bin/python3 3000;
    cgi .php /usr/bin/php-cgi 3000;
    cgi .cgi  /usr/bin/bash  3000;
    try_files $uri =404;
    autoindex off;
  }

# Multipart uploads (handled by UploadHandler)
location /upload {
    root www/upload;
    methods POST;

    upload_store www/upload/files;
    upload_overwrite off;
    upload_max_file_size 2m;

    client_max_body_size 200m;
    autoindex off;
}


# Raw writes / edits (handled by PutPatchHandler)
location /files {
    root /www/upload;

    # 'methods' in your parser accepts only GET/POST/DELETE
    methods GET DELETE;

    allow_put on;
    allow_patch on;

    client_max_body_size 5m;
    autoindex off;
}




  location /old { return 301 /new; }

  location /internal {
    allow 127.0.0.1;
    deny  all;
    methods GET;
  }

  location /cgi-bin {
    root ./www/cgi;
    methods GET POST;
    cgi .py  /usr/bin/python3 3000;
    cgi .php /usr/bin/php-cgi 3000;
    cgi .cgi  /usr/bin/bash  3000;
    try_files $uri =404;
    autoindex off;
  }

  location /api {
    methods GET POST DELETE;
    proxy_pass 127.0.0.1:9000;
    autoindex off;
  }
}
