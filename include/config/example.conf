server{
	listen 127.0.0.1:8080;
	root ./www;
	index index.html;

	error_page 404 ./www/errors/404.html;
	client_max_body_size 1m;

	location /upload {
		methods POST;
		upload_store ./www/uploads;
	}

	location /cgi {
		cgi .py /usr/bin/python3;
	}

	location / {
		autoindex off;
	}

	location /old {
		return 301 /new;
	}

}